services:
  postgres:
    container_name: ${NEXT_PUBLIC_APP_SLUG:-app}-postgres
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${NEXT_PUBLIC_APP_SLUG:-app}
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - '5432:5432'
    volumes:
      - ./.postgres:/var/lib/postgresql/data

volumes:
  postgres:
